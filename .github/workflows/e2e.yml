name: E2E

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run make apply
        run: make apply
