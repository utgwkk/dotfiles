- name: create ~/.config
  file: path=~/.config state=directory mode=0755

- name: create ~/.config/git
  file: path=~/.config/git state=directory mode=0755

- name: create ~/.config/uv
  file: path=~/.config/uv state=directory mode=0755

- name: create ~/.claude
  file: path=~/.claude state=directory mode=0755

- name: copy dotfiles
  copy:
    src: "../files/{{ item }}"
    dest: "~/{{ item }}"
  with_items:
    - ".aliases"
    - ".zshrc"
    - ".zprofile"
    - ".zlogin"
    - ".zlogout"
    - ".config/git/config"
    - ".config/git/ignore"
    - ".config/uv/uv.toml"
    - ".vimrc"
    - ".tmux.conf"
    - ".claude/CLAUDE.md"
    - ".claude/settings.json"
    - ".claude/keybindings.json"
